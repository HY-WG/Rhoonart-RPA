service: rhoonart-rpa

frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.11
  region: ${env:AWS_REGION, "ap-northeast-2"}
  memorySize: 512
  timeout: 300
  environment:
    # Google
    GOOGLE_CREDENTIALS_FILE: credentials.json

    # Slack
    SLACK_BOT_TOKEN: ${env:SLACK_BOT_TOKEN}
    SLACK_ERROR_CHANNEL: ${env:SLACK_ERROR_CHANNEL, "#rpa-error"}

    # Email
    SENDER_EMAIL: ${env:SENDER_EMAIL}
    SENDER_NAME: ${env:SENDER_NAME, "Rhoonart"}
    USE_SES: ${env:USE_SES, "true"}
    SMTP_HOST: ${env:SMTP_HOST, "smtp.gmail.com"}
    SMTP_PORT: ${env:SMTP_PORT, "587"}
    SMTP_USER: ${env:SMTP_USER, ""}
    SMTP_PASSWORD: ${env:SMTP_PASSWORD, ""}

    # Shared sheets
    CONTENT_SHEET_ID: ${env:CONTENT_SHEET_ID}
    LOG_SHEET_ID: ${env:LOG_SHEET_ID, ""}
    TAB_LOG: ${env:TAB_LOG, "log_records"}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendRawEmail
          Resource: "*"

package:
  exclude:
    - node_modules/**
    - .venv/**
    - .git/**
    - scripts/**
    - "**/__pycache__/**"
    - "**/*.pyc"
    - tests/**
    - "*.md"

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
    layer: true

functions:
  # A-2: Slack work approval automation
  a2WorkApproval:
    handler: lambda/a2_work_approval_handler.handler
    description: "A-2 Slack work-usage request handling with Drive permission update and approval email"
    timeout: 29
    environment:
      CREATOR_SHEET_ID: ${env:CREATOR_SHEET_ID, "1JZ0eLnvMgpjAehpxRfPN2RiG6Pd22EidnnG8tmAvlKQ"}
      DRIVE_FOLDER_ID: ${env:DRIVE_FOLDER_ID, "1SEVgIFr8HivMFXBru3C-mfgfTETeLW92"}
      SLACK_APPROVAL_CHANNEL: ${env:SLACK_APPROVAL_CHANNEL, ""}
      ADMIN_API_BASE_URL: ${env:ADMIN_API_BASE_URL, ""}
    events:
      - http:
          path: /slack/events
          method: post
          cors: true

  # A-3: Monthly homepage intake confirmation on the last day of the month
  a3NaverClipConfirm:
    handler: lambda/a3_naver_clip_monthly_handler.handler
    description: "A-3 month-end homepage applicant summary notification to Slack"
    environment:
      NAVER_APPLICANT_SHEET_ID: ${env:NAVER_APPLICANT_SHEET_ID, ""}
      NAVER_APPLICANT_TAB: ${env:NAVER_APPLICANT_TAB, "NAVER_APPLICANTS"}
      NAVER_MANAGER_EMAIL: ${env:NAVER_MANAGER_EMAIL}
      NAVER_SLACK_CHANNEL: ${env:NAVER_SLACK_CHANNEL, "#naver-clip"}
    events:
      - schedule:
          rate: cron(0 1 L * ? *)
          enabled: true
          input:
            mode: "confirm"

  # A-3: Monthly homepage intake report email on the first day of the month
  a3NaverClipSend:
    handler: lambda/a3_naver_clip_monthly_handler.handler
    description: "A-3 previous-month homepage applicant export and email delivery"
    environment:
      NAVER_APPLICANT_SHEET_ID: ${env:NAVER_APPLICANT_SHEET_ID, ""}
      NAVER_APPLICANT_TAB: ${env:NAVER_APPLICANT_TAB, "NAVER_APPLICANTS"}
      NAVER_MANAGER_EMAIL: ${env:NAVER_MANAGER_EMAIL}
      NAVER_SLACK_CHANNEL: ${env:NAVER_SLACK_CHANNEL, "#naver-clip"}
    events:
      - schedule:
          rate: cron(30 1 1 * ? *)
          enabled: true
          input:
            mode: "send"

  # B-2: Weekly performance report
  b2WeeklyReport:
    handler: lambda/b2_weekly_report_handler.handler
    description: "B-2 weekly Naver Clip performance report and rights-holder email delivery"
    timeout: 600
    memorySize: 1024
    environment:
      PERFORMANCE_SHEET_ID: ${env:PERFORMANCE_SHEET_ID, ""}
      TAB_CONTENT: ${env:TAB_CONTENT, "content_list"}
      TAB_STATS: ${env:TAB_STATS, "performance_stats"}
      TAB_RIGHTS: ${env:TAB_RIGHTS, "rights_management"}
      LOOKER_URL_WAVVE: ${env:LOOKER_URL_WAVVE, ""}
      LOOKER_URL_PANSCINEMA: ${env:LOOKER_URL_PANSCINEMA, ""}
      LOOKER_URL_RIGHTS: ${env:LOOKER_URL_RIGHTS, ""}
    events:
      - http:
          path: /report/weekly
          method: post
          cors: true

  # C-1: YouTube Shorts lead discovery
  c1LeadFilter:
    handler: lambda/c1_lead_filter_handler.handler
    description: "C-1 YouTube Shorts lead discovery and lead-sheet update"
    timeout: 600
    memorySize: 1024
    environment:
      YOUTUBE_API_KEY: ${env:YOUTUBE_API_KEY}
      SEED_CHANNEL_SHEET_ID: ${env:SEED_CHANNEL_SHEET_ID, "18HY8-FdG_nAe-gOP7WNKiu5k7xMQliW9oxvKTcLC8Is"}
      SEED_CHANNEL_GID: ${env:SEED_CHANNEL_GID, "1224056617"}
      LEAD_SHEET_ID: ${env:LEAD_SHEET_ID}
      TAB_LEADS: ${env:TAB_LEADS, "leads"}
      C1_MAX_CHANNELS: ${env:C1_MAX_CHANNELS, "200"}
    events:
      - schedule:
          rate: cron(0 1 1 * ? *)
          enabled: true
          input:
            source: "cron"

  # C-2: Cold email delivery
  c2ColdEmail:
    handler: lambda/c2_cold_email_handler.handler
    description: "C-2 cold email delivery"
    environment:
      LEAD_SHEET_ID: ${env:LEAD_SHEET_ID}
      TAB_LEADS: ${env:TAB_LEADS, "leads"}
      C2_BATCH_SIZE: ${env:C2_BATCH_SIZE, "50"}
      C2_MIN_MONTHLY_VIEWS: ${env:C2_MIN_MONTHLY_VIEWS, "0"}

  # C-3: Work registration
  c3WorkRegister:
    handler: lambda/c3_work_register_handler.handler
    description: "C-3 work registration and guideline creation"

  # C-4: Coupon notification
  c4CouponNotification:
    handler: lambda/c4_coupon_notification_handler.handler
    description: "C-4 coupon request detection and notification"

  # D-2: Relief request backoffice
  d2ReliefRequest:
    handler: lambda/d2_relief_request_handler.handler
    description: "D-2 relief request backoffice API"
    events:
      - http:
          path: /relief/request
          method: post
          cors: true

  # D-3: Kakao creator onboarding
  d3KakaoCreatorOnboarding:
    handler: lambda/d3_kakao_creator_onboarding_handler.handler
    description: "D-3 Kakao creator onboarding sheet processing"
